<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Plumbing flood-readiness article header</title>
  <desc id="desc">Badger Automation Group editorial artwork for a plumbing Google Business Profile article about basement flood and sump-pump demand.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120909"/>
      <stop offset="45%" stop-color="#8d1710"/>
      <stop offset="100%" stop-color="#d79029"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ea" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#f0e2c5" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2b6f91"/>
      <stop offset="100%" stop-color="#5ca5c1"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1360" cy="150" r="180" fill="#ffd98f" fill-opacity="0.22"/>
