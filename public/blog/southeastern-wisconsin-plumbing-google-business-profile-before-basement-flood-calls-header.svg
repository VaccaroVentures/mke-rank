  <text x="140" y="276" fill="#210808" font-family="Rubik, Arial, sans-serif" font-size="73" font-weight="800">Plumbing GBP prep</text>
  <text x="140" y="352" fill="#210808" font-family="Rubik, Arial, sans-serif" font-size="73" font-weight="800">before basement flood</text>
  <text x="140" y="428" fill="#a60000" font-family="Rubik, Arial, sans-serif" font-size="82" font-weight="800">and sump-pump spikes</text>
  <text x="140" y="500" fill="#4f2d2a" font-family="Rubik, Arial, sans-serif" font-size="28" font-weight="500">Emergency routing, seasonal posts, photos, reviews,</text>
  <text x="140" y="538" fill="#4f2d2a" font-family="Rubik, Arial, sans-serif" font-size="28" font-weight="500">and landing pages for southeastern Wisconsin plumbers.</text>

