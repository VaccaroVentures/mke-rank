  <rect x="82" y="104" width="858" height="694" rx="38" fill="url(#panel)"/>
  <rect x="1018" y="150" width="496" height="598" rx="34" fill="#220f10" fill-opacity="0.84" stroke="#ffd28a" stroke-opacity="0.34"/>

