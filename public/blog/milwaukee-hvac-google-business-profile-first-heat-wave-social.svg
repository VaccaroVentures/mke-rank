<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">HVAC social card</title>
  <desc id="desc">Badger Automation Group social image for an HVAC Google Business Profile article.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140202"/>
      <stop offset="55%" stop-color="#8a0909"/>
      <stop offset="100%" stop-color="#e19619"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1035" cy="118" r="82" fill="#ffd989" fill-opacity="0.95"/>
  <circle cx="958" cy="93" r="176" fill="#ffd989" fill-opacity="0.16"/>

  <g stroke="#ffffff" stroke-opacity="0.12">
    <path d="M0 160H1200M0 315H1200M0 470H1200"/>
    <path d="M180 0V630M370 0V630M560 0V630M750 0V630M940 0V630"/>
