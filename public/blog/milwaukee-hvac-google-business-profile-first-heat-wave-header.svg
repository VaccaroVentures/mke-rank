  <text x="146" y="438" fill="#a60000" font-family="Rubik, Arial, sans-serif" font-size="86" font-weight="800">first heat wave</text>
  <text x="146" y="514" fill="#4c2720" font-family="Rubik, Arial, sans-serif" font-size="28" font-weight="500">Milwaukee-area HVAC operators need the profile, photos,</text>
  <text x="146" y="552" fill="#4c2720" font-family="Rubik, Arial, sans-serif" font-size="28" font-weight="500">reviews, and landing pages ready before the phones spike.</text>

