<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HVAC heat wave article header</title>
  <desc id="desc">Badger Automation Group editorial artwork for an HVAC Google Business Profile article.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#160202"/>
      <stop offset="48%" stop-color="#6f0000"/>
      <stop offset="100%" stop-color="#d57a00"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ea" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#f1dfbc" stop-opacity="0.88"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="180" r="220" fill="#ffcf66" fill-opacity="0.22"/>
  <circle cx="1430" cy="125" r="84" fill="#ffd98c" fill-opacity="0.78"/>
