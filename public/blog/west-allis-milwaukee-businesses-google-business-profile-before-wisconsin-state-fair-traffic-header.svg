  <rect x="88" y="104" width="890" height="694" rx="40" fill="url(#panel)"/>
  <rect x="1022" y="144" width="486" height="616" rx="36" fill="#220808" fill-opacity="0.86" stroke="#ffd07a" stroke-opacity="0.34"/>

