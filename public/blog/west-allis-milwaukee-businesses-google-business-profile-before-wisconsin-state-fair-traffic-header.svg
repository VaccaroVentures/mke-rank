<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">West Allis and Milwaukee State Fair Google Business Profile article header</title>
  <desc id="desc">Badger Automation Group editorial artwork for a Google Business Profile article about Wisconsin State Fair traffic.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150303"/>
      <stop offset="52%" stop-color="#7e0f0f"/>
      <stop offset="100%" stop-color="#d7971a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ea" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#f0dfbd" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1328" cy="146" r="180" fill="#ffe0a0" fill-opacity="0.2"/>
