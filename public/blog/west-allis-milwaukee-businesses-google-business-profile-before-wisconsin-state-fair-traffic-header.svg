  <text x="146" y="350" fill="#220707" font-family="Rubik, Arial, sans-serif" font-size="68" font-weight="800">businesses: fix Google</text>
  <text x="146" y="424" fill="#a60000" font-family="Rubik, Arial, sans-serif" font-size="74" font-weight="800">Business Profile before</text>
  <text x="146" y="500" fill="#a60000" font-family="Rubik, Arial, sans-serif" font-size="74" font-weight="800">Wisconsin State Fair traffic</text>
  <text x="146" y="578" fill="#4d2921" font-family="Rubik, Arial, sans-serif" font-size="28" font-weight="500">Special hours, categories, photos, posts, reviews, and landing pages</text>
  <text x="146" y="616" fill="#4d2921" font-family="Rubik, Arial, sans-serif" font-size="28" font-weight="500">for operators whose local intent changes when fair week hits West Allis.</text>

